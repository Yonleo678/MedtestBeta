<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营销推广数据汇总系统 - Premium Enterprise</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans SC"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] },
                    colors: {
                        champagne: {
                            50: '#FDFBF7',   
                            100: '#F6EFE2',  
                            200: '#EADBB9',  
                            500: '#C5A059',  
                            600: '#A98443',  
                            700: '#8E6B31'   
                        },
                        slate: { 900: '#1C1C1E' } 
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #FDFBF7; color: #1C1C1E; -webkit-font-smoothing: antialiased; font-family: "Noto Sans SC", sans-serif; }
        .premium-card { background: #FFFFFF; border: 1px solid #F6EFE2; border-radius: 1rem; transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        .premium-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(197, 160, 89, 0.08); }
        .premium-input { width: 100%; padding: 0.625rem 0.875rem; border-radius: 0.75rem; border: 1px solid #EADBB9; background: #FDFBF7; transition: all 0.2s ease; outline: none; font-size: 0.875rem; }
        .premium-input:focus { border-color: #C5A059; background: #FFFFFF; box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1); }
        .btn-gold { background: linear-gradient(135deg, #C5A059 0%, #A98443 100%); color: white; transition: all 0.25s ease; }
        .btn-gold:hover { opacity: 0.95; box-shadow: 0 4px 12px rgba(169, 132, 67, 0.25); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .dropdown-menu { display: none; }
        .dropdown-container.open .dropdown-menu { display: block; }
        .active-nav { background-color: #F6EFE2; color: #1C1C1E; font-weight: 500; }
    </style>
</head>
<body class="overflow-hidden text-sm">

    <div id="syncProgressLayer" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md hidden flex-col items-center justify-center z-[99999]">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-80 text-center space-y-4">
            <div class="flex justify-between text-xs font-bold text-champagne-700">
                <span id="syncStatusText">正在外发核心同步流...</span>
                <span id="syncPercent">0%</span>
            </div>
            <div class="w-full bg-champagne-50 h-2 rounded-full overflow-hidden">
                <div id="syncProgressBar" class="bg-gradient-to-r from-champagne-500 to-champagne-700 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <div class="flex h-screen w-screen overflow-hidden">
        
        <aside id="sidebar" class="w-64 bg-white border-r border-champagne-100 flex flex-col z-30 transform md:transform-none fixed md:relative h-full transition-transform duration-300 -translate-x-full md:translate-x-0">
            <div class="p-6 flex items-center justify-between border-b border-champagne-50">
                <div class="flex items-center gap-3">
                    <div class="w-6 h-6 rounded-lg btn-gold flex items-center justify-center text-xs"><i class="fas fa-chart-line"></i></div>
                    <span class="font-bold tracking-wider text-sm">营销数据汇总</span>
                </div>
                <button class="md:hidden text-gray-400 hover:text-black" onclick="App.toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto no-scrollbar" id="sidebarMenu">
                </nav>
            <div class="p-4 border-t border-champagne-50 flex items-center justify-between bg-champagne-50/30">
                <div class="flex items-center gap-2">
                    <div id="roleBadge" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <span id="roleText" class="text-xs font-medium text-gray-600">管理员模式</span>
                </div>
                <button onclick="App.togglePermissionMode()" class="text-[11px] text-champagne-600 hover:underline font-medium">切权</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden relative">
            
            <header class="h-16 bg-white/80 backdrop-blur-md border-b border-champagne-100 flex items-center justify-between px-6 z-20">
                <div class="flex items-center gap-4">
                    <button class="md:hidden text-gray-600 text-lg" onclick="App.toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h1 id="viewTitle" class="font-bold text-base tracking-tight text-slate-900">数据大盘视图</h1>
                </div>
                
                <div class="flex items-center gap-3" id="globalFilterWrapper">
                    <select id="globalPlatformFilter" class="premium-input !py-1.5 w-40 bg-white cursor-pointer" onchange="App.handleFilterChange()">
                        <option value="all">全渠道汇总数据</option>
                    </select>
                    
                    <div class="relative dropdown-container" id="monthDropdownContainer">
                        <button class="premium-input !py-1.5 w-44 flex justify-between items-center bg-white cursor-pointer" onclick="App.toggleMonthDropdown(event)">
                            <span id="monthFilterSummary" class="truncate text-xs font-medium text-gray-600">所有账期月份</span>
                            <i class="fas fa-chevron-down text-[10px] text-champagne-500"></i>
                        </button>
                        <div class="dropdown-menu absolute top-full right-0 mt-1.5 w-56 bg-white/95 backdrop-blur-xl shadow-xl rounded-xl border border-champagne-200 p-3 z-50 max-h-60 overflow-y-auto no-scrollbar">
                            <div class="flex justify-between items-center pb-2 mb-2 border-b border-champagne-100">
                                <button class="text-[11px] text-champagne-600 font-bold" onclick="App.bulkSelectMonths(true)">全选</button>
                                <button class="text-[11px] text-gray-400 font-bold" onclick="App.bulkSelectMonths(false)">清空</button>
                            </div>
                            <div id="monthCheckboxStack" class="space-y-1"></div>
                        </div>
                    </div>
                </div>
            </header>

            <div id="stage" class="flex-1 overflow-y-auto p-6 md:p-8 no-scrollbar"></div>
        </main>
    </div>

    <div id="globalModal" class="fixed inset-0 bg-slate-900/30 backdrop-blur-sm hidden items-center justify-center p-4 z-50 animate-fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[85vh] border border-champagne-100">
            <div class="p-5 border-b border-champagne-50 bg-champagne-50/20 flex justify-between items-center">
                <h3 id="modalTitle" class="font-bold text-sm tracking-wide text-slate-900">系统弹窗</h3>
                <button onclick="App.closeModal()" class="text-gray-400 hover:text-black"><i class="fas fa-times text-sm"></i></button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto flex-1 space-y-4 no-scrollbar"></div>
            <div class="p-4 border-t border-champagne-50 bg-champagne-50/10 flex justify-end gap-2">
                <button onclick="App.closeModal()" id="modalCancelBtn" class="px-4 py-2 rounded-xl text-gray-500 bg-white border border-champagne-200 hover:bg-champagne-50 text-xs font-medium">取消</button>
                <button id="modalConfirmBtn" class="px-4 py-2 rounded-xl text-white btn-gold text-xs font-medium">确认提交</button>
            </div>
        </div>
    </div>

    <div id="chartFullscreenBox" class="fixed inset-0 bg-white hidden flex-col p-8 z-[9999] animate-fade-in">
        <div class="w-full flex justify-between items-center max-w-4xl mx-auto mb-6 border-b border-champagne-100 pb-4">
            <h2 class="text-sm font-bold tracking-wider text-slate-900"><i class="fas fa-chart-pie text-champagne-500 mr-2"></i>初诊分类消费占比 - 深度多维高精大图</h2>
            <button class="w-9 h-9 bg-champagne-100 text-champagne-700 rounded-xl flex items-center justify-center hover:bg-champagne-200" onclick="App.closeFullscreenChart()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="flex-1 w-full max-w-3xl mx-auto flex items-center justify-center">
            <canvas id="fullscreenPieChart"></canvas>
        </div>
    </div>

    <script>
        const App = (function() {
            const state = {
                platforms: [], costs: [], visits: [], chats: [], logs: [], recycleBin: [],
                settings: { token: '', gistId: '', fbUrl: '', mode: 'admin' },
                filters: { platform: 'all', months: [], search: '', page: 1, limit: 6 },
                routing: 'dashboard'
            };

            let doughnutChartInstance = null;
            let fullscreenChartInstance = null;

            const init = () => {
                loadSettings();
                loadFromLocalStorage();
                parseUrlParametersOnLoad(); 
                
                if (state.platforms.length === 0) {
                    generateMockData();
                    saveToLocalStorage();
                }
                setupGlobalInterceptors();
                renderSidebar();
                buildMonthFilterStack();
                route(state.routing);
                autoConnectFirebase();
            };

            const loadSettings = () => {
                const saved = localStorage.getItem('matrix_sys_settings');
                if (saved) state.settings = { ...state.settings, ...JSON.parse(saved) };
            };
            const saveSettings = () => {
                localStorage.setItem('matrix_sys_settings', JSON.stringify(state.settings));
            };
            const loadFromLocalStorage = () => {
                const raw = localStorage.getItem('matrix_sys_data');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    ['platforms','costs','visits','chats','logs','recycleBin'].forEach(k => {
                        if(parsed[k]) state[k] = parsed[k];
                    });
                }
            };
            const saveToLocalStorage = () => {
                localStorage.setItem('matrix_sys_data', JSON.stringify({
                    platforms: state.platforms, costs: state.costs, visits: state.visits,
                    chats: state.chats, logs: state.logs, recycleBin: state.recycleBin
                }));
            };

            const logAction = (action) => {
                state.logs.unshift({ id: 'log_' + Date.now(), time: new Date().toLocaleString(), action });
                if(state.logs.length > 100) state.logs.pop();
            };

            const commitState = async (logText) => {
                saveToLocalStorage();
                if(logText) logAction(logText);
                if (state.settings.mode === 'admin') {
                    await triggerCloudSynchronization();
                }
                refreshCurrentView();
            };

            const setupGlobalInterceptors = () => {
                window.onclick = (e) => {
                    if (!e.target.closest('#monthDropdownContainer')) {
                        document.getElementById('monthDropdownContainer').classList.remove('open');
                    }
                };
            };

            const generateMockData = () => {
                const m1 = "2026-04"; const m2 = "2026-05";
                state.platforms = [
                    { id: 'p_1', name: '小红书信息流公户', account: 'xhs-beauty-01' },
                    { id: 'p_2', name: '美团点评专区', account: 'meituan-mt-99' },
                    { id: 'p_3', name: '抖音巨量千川', account: 'douyin-qc-66' }
                ];
                state.costs = [
                    { id: 'c_1', date: m1, platformId: 'p_1', amount: 15000 },
                    { id: 'c_2', date: m1, platformId: 'p_2', amount: 12000 },
                    { id: 'c_3', date: m2, platformId: 'p_1', amount: 18000 },
                    { id: 'c_4', date: m2, platformId: 'p_3', amount: 25000 }
                ];
                state.visits = [
                    { id: 'v_1', date: m1, platformId: 'p_1', category: '皮肤项目', items: [{name:'超声炮', count:5, amount:20000}, {name:'水光针', count:10, amount:8000}] },
                    { id: 'v_2', date: m1, platformId: 'p_2', category: '脱毛护理', items: [{name:'冰点脱毛', count:40, amount:6000}] },
                    { id: 'v_3', date: m2, platformId: 'p_1', category: '注射项目', items: [{name:'玻尿酸面雕', count:6, amount:24000}] },
                    { id: 'v_4', date: m2, platformId: 'p_3', category: '手术项目', items: [{name:'眼综合精雕', count:2, amount:30000}] }
                ];
                state.chats = [
                    { id: 'ch_1', date: m1, platformId: 'p_1', valid: 300, invalid: 80 },
                    { id: 'ch_2', date: m1, platformId: 'p_2', valid: 500, invalid: 50 },
                    { id: 'ch_3', date: m2, platformId: 'p_1', valid: 350, invalid: 90 },
                    { id: 'ch_4', date: m2, platformId: 'p_3', valid: 420, invalid: 150 }
                ];
                logAction('系统成功初始化并自动填充大厂级演示数据包');
            };

            const getFilteredData = () => {
                const plat = state.filters.platform;
                const months = state.filters.months;
                
                const filterRule = (item) => {
                    const matchPlat = (plat === 'all' || item.platformId === plat);
                    const matchMonth = (months.length === 0 || months.includes(item.date));
                    return matchPlat && matchMonth;
                };

                return {
                    costs: state.costs.filter(filterRule),
                    visits: state.visits.filter(filterRule),
                    chats: state.chats.filter(filterRule)
                };
            };

            const calculateMetrics = () => {
                const fd = getFilteredData();
                const promoCost = fd.costs.reduce((sum, c) => sum + Number(c.amount), 0);
                
                let totalVisits = 0;
                let totalRevenue = 0;
                fd.visits.forEach(v => {
                    v.items.forEach(i => {
                        totalVisits += Number(i.count);
                        totalRevenue += Number(i.amount);
                    });
                });

                const validChats = fd.chats.reduce((sum, c) => sum + Number(c.valid), 0);
                const invalidChats = fd.chats.reduce((sum, c) => sum + Number(c.invalid), 0);
                const totalChats = validChats + invalidChats;

                return {
                    promoCost,
                    totalVisits,
                    costPerVisit: totalVisits ? (promoCost / totalVisits).toFixed(2) : '0.00',
                    totalRevenue,
                    avgTicket: totalVisits ? (totalRevenue / totalVisits).toFixed(2) : '0.00',
                    roi: promoCost ? (totalRevenue / promoCost).toFixed(2) : '0.00',
                    validChats,
                    invalidChats,
                    totalChats,
                    validRatio: totalChats ? ((validChats / totalChats) * 100).toFixed(1) : '0.0',
                    invalidRatio: totalChats ? ((invalidChats / totalChats) * 100).toFixed(1) : '0.0'
                };
            };

            const menuItems = [
                { id: 'dashboard', name: '数据大盘视图', icon: 'fa-chart-pie' },
                { id: 'platforms', name: '多平台与账户管理', icon: 'fa-sliders-h' },
                { id: 'costs', name: '推广费用流水记录', icon: 'fa-wallet' },
                { id: 'visits', name: '初诊到院明细记录', icon: 'fa-user-check' },
                { id: 'chats', name: '后台对话记录系统', icon: 'fa-comment-alt' },
                { id: 'recycle', name: '回收站与核心审计', icon: 'fa-history' },
                { id: 'settings', name: '系统高级闭环配置', icon: 'fa-cogs' }
            ];

            const renderSidebar = () => {
                const container = document.getElementById('sidebarMenu');
                container.innerHTML = menuItems.map(item => `
                    <button onclick="App.route('${item.id}')" class="w-full flex items-center gap-3 px-4 py-2.5 text-xs rounded-xl transition-all ${state.routing === item.id ? 'active-nav' : 'text-gray-500 hover:bg-champagne-50/50 hover:text-black'}">
                        <i class="fas ${item.icon} w-4 text-center text-sm ${state.routing === item.id ? 'text-champagne-600' : 'text-gray-400'}"></i>
                        <span>${item.name}</span>
                    </button>
                `).join('');
            };

            const route = (target) => {
                state.routing = target;
                state.filters.page = 1; 
                renderSidebar();
                
                const filterWrapper = document.getElementById('globalFilterWrapper');
                if (['dashboard', 'costs', 'visits', 'chats'].includes(target)) {
                    filterWrapper.classList.remove('hidden');
                    syncFilterDropdownsDOM();
                } else {
                    filterWrapper.classList.add('hidden');
                }

                document.getElementById('viewTitle').innerText = menuItems.find(m => m.id === target).name;
                
                const stage = document.getElementById('stage');
                stage.innerHTML = `<div class="opacity-0 transition-opacity duration-300" id="subStage"></div>`;
                const subStage = document.getElementById('subStage');

                switch(target) {
                    case 'dashboard': renderDashboard(subStage); break;
                    case 'platforms': renderPlatforms(subStage); break;
                    case 'costs': renderGenericTable(subStage, 'costs'); break;
                    case 'visits': renderGenericTable(subStage, 'visits'); break;
                    case 'chats': renderGenericTable(subStage, 'chats'); break;
                    case 'recycle': renderRecycleAndLogs(subStage); break;
                    case 'settings': renderSettings(subStage); break;
                }
                setTimeout(() => subStage.classList.remove('opacity-0'), 50);
                if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('-translate-x-full');
            };

            const refreshCurrentView = () => route(state.routing);

            const buildMonthFilterStack = () => {
                const allDates = [...new Set([...state.costs, ...state.visits, ...state.chats].map(x => x.date))].sort().reverse();
                if(allDates.length === 0) {
                    const cur = new Date().toISOString().substring(0,7);
                    allDates.push(cur);
                }
                const stack = document.getElementById('monthCheckboxStack');
                stack.innerHTML = allDates.map(m => `
                    <label class="flex items-center gap-2 p-1.5 hover:bg-champagne-50 rounded-lg cursor-pointer text-xs">
                        <input type="checkbox" value="${m}" class="month-filter-cb rounded border-champagne-200 text-champagne-500 focus:ring-champagne-500" ${state.filters.months.includes(m)?'checked':''}>
                        <span class="font-mono">${m}</span>
                    </label>
                `).join('');

                document.querySelectorAll('.month-filter-cb').forEach(cb => {
                    cb.onchange = () => {
                        state.filters.months = Array.from(document.querySelectorAll('.month-filter-cb:checked')).map(el => el.value);
                        handleFilterChange();
                    };
                });
            };

            const syncFilterDropdownsDOM = () => {
                const platSel = document.getElementById('globalPlatformFilter');
                if (platSel) {
                    platSel.innerHTML = `<option value="all">全渠道汇总数据</option>` + 
                        state.platforms.map(p => `<option value="${p.id}" ${state.filters.platform===p.id?'selected':''}>${p.name}</option>`).join('');
                }
                
                const summaryText = document.getElementById('monthFilterSummary');
                if (summaryText) {
                    summaryText.innerText = state.filters.months.length === 0 ? "所有账期月份" : `已选 ${state.filters.months.length} 个账期`;
                }
            };

            const handleFilterChange = () => {
                syncFilterDropdownsDOM();
                refreshCurrentView();
            };

            const bulkSelectMonths = (status) => {
                document.querySelectorAll('.month-filter-cb').forEach(cb => cb.checked = status);
                state.filters.months = status ? Array.from(document.querySelectorAll('.month-filter-cb')).map(el => el.value) : [];
                handleFilterChange();
            };

            const toggleMonthDropdown = (e) => {
                e.stopPropagation();
                document.getElementById('monthDropdownContainer').classList.toggle('open');
            };

            const renderDashboard = (con) => {
                const m = calculateMetrics();
                const renderCard = (lbl, val, pre='', suf='', hint='') => `
                    <div class="premium-card p-5 flex flex-col justify-between min-h-[110px]">
                        <div>
                            <div class="text-[10px] uppercase tracking-wider text-gray-400 font-bold mb-1">${lbl}</div>
                            <div class="text-xl font-bold tracking-tight text-slate-900">${pre}${Number(val).toLocaleString('zh-CN', {minimumFractionDigits: pre?2:0})}${suf}</div>
                        </div>
                        ${hint ? `<div class="text-[9px] text-champagne-600 mt-2 flex items-center gap-1 font-medium"><i class="fas fa-info-circle"></i> ${hint}</div>` : ''}
                    </div>`;

                con.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <h4 class="text-xs font-bold text-champagne-700 uppercase tracking-widest mb-3 flex items-center gap-2">
                                <span class="w-1.5 h-3 bg-champagne-500 rounded-full"></span> 核心投放业绩明细 (仅展示筛选范围)
                            </h4>
                            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                                ${renderCard('渠道推广费用', m.promoCost, '¥')}
                                ${renderCard('总到院人数', m.totalVisits, '', ' 人')}
                                ${renderCard('总到院成本', m.costPerVisit, '¥', ' /人', '推广费用 ÷ 到院人数')}
                                ${renderCard('总初诊业绩', m.totalRevenue, '¥')}
                                ${renderCard('初诊平均客单价', m.avgTicket, '¥', ' /人', '初诊业绩 ÷ 到院人数')}
                                ${renderCard('综合投产比 (ROI)', m.roi, '', '', '初诊业绩 ÷ 推广费用')}
                            </div>
                        </div>

                        <div>
                            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                                <span class="w-1.5 h-3 bg-gray-300 rounded-full"></span> 咨询对话流转化大盘
                            </h4>
                            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                                ${renderCard('有效对话数', m.validChats, '', ' 次')}
                                ${renderCard('有效对话占比', m.validRatio, '', '%', '有效对话 ÷ 总对话数')}
                                ${renderCard('无效对话数', m.invalidChats, '', ' 次')}
                                ${renderCard('无效对话占比', m.invalidRatio, '', '%', '无效对话 ÷ 总对话数')}
                                ${renderCard('总对话数', m.totalChats, '', ' 次')}
                            </div>
                        </div>

                        <div class="premium-card p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="text-xs font-bold uppercase tracking-wider text-gray-400">初诊各类别消费占比分析面板</h4>
                                <button onclick="App.openFullscreenChart()" class="text-xs text-champagne-600 bg-champagne-50 px-3 py-1.5 rounded-lg font-bold hover:bg-champagne-100 transition">
                                    <i class="fas fa-expand-arrows-alt mr-1"></i> 互动式全屏无损放大
                                </button>
                            </div>
                            <div class="h-64 relative flex justify-center cursor-pointer" onclick="App.openFullscreenChart()">
                                <canvas id="dashboardDoughnutChart"></canvas>
                            </div>
                        </div>
                    </div>
                `;
                buildDoughnutChartLogic();
            };

            const buildDoughnutChartLogic = () => {
                const fd = getFilteredData();
                const categories = { '脱毛护理': 0, '皮肤项目': 0, '注射项目': 0, '手术项目': 0 };
                fd.visits.forEach(v => {

                    } else {
                        state[type].push(targetPayload);
                        commitState(`增量提报了 [${type}] 数据流水一笔`);
                    }
                    buildMonthFilterStack();
                    return true;
                });

                if(type === 'visits') {
                    if(isEdit && row.items) {
                        row.items.forEach(i => appendSubItemRow(i.name, i.count, i.amount));
                    } else {
                        appendSubItemRow();
                    }
                }
            };

            const appendSubItemRow = (name='', count='', amount='') => {
                const con = document.getElementById('subItemContainer');
                if(!con) return;
                const rowId = 'si_' + Date.now() + Math.random().toString(36).substr(2, 4);
                const el = document.createElement('div');
                el.className = 'flex gap-2 items-center sub-item-row animate-fade-in';
                el.id = rowId;
                el.innerHTML = `
                    <input type="text" placeholder="品类名" value="${name}" class="premium-input !py-1 text-xs flex-1 si-name" oninput="App.recalcSubItemSum()">
                    <input type="number" placeholder="人数" value="${count}" class="premium-input !py-1 text-xs w-16 si-count" oninput="App.recalcSubItemSum()">
                    <input type="number" placeholder="总额" value="${amount}" class="premium-input !py-1 text-xs w-24 si-amount" oninput="App.recalcSubItemSum()">
                    <button type="button" onclick="document.getElementById('${rowId}').remove(); App.recalcSubItemSum();" class="text-gray-300 hover:text-rose-500"><i class="fas fa-minus-circle"></i></button>
                `;
                con.appendChild(el);
                recalcSubItemSum();
            };

            const recalcSubItemSum = () => {
                let sum = 0;
                document.querySelectorAll('.sub-item-row').forEach(r => {
                    const amt = r.querySelector('.si-amount').value;
                    if(amt) sum += Number(amt);
                });
                const txt = document.getElementById('subItemSumText');
                if(txt) txt.innerText = `总计金额: ¥${sum.toLocaleString()}`;
            };

            const deleteRecordRow = async (type, id) => {
                const check = await Swal.fire({
                    text: '确定要将该流水送入暂存回收站？大盘将立即扣减相关权值。',
                    icon: 'warning', showCancelButton: true, confirmButtonColor: '#1C1C1E', cancelButtonColor: '#EADBB9', confirmButtonText: '作废移入回收站', cancelButtonText: '取消'
                });
                if(check.isConfirmed) {
                    const targetIdx = state[type].findIndex(x=>x.id===id);
                    const deleted = state[type].splice(targetIdx, 1)[0];
                    state.recycleBin.push({ id: 'rb_' + Date.now(), type, data: deleted });
                    await commitState(`流水作废移入回收站, 类别: [${type}], 原ID: ${id}`);
                }
            };

            const restoreRecycleItem = async (rbId) => {
                const matchIdx = state.recycleBin.findIndex(x=>x.id===rbId);
                const restored = state.recycleBin.splice(matchIdx, 1)[0];
                state[restored.type].push(restored.data);
                await commitState(`回收站紧急复原账目数据流水成功, 原ID: ${restored.data.id}`);
            };

            const executeBatchDelete = async (type) => {
                const checkedIds = Array.from(document.querySelectorAll('.row-batch-cb:checked')).map(el => el.value);
                if(checkedIds.length === 0) return Swal.fire({text:'没有捕获到任何勾选节点', icon:'info'});
                
                const check = await Swal.fire({ text: `确认对这 ${checkedIds.length} 项记录进行批量作废入库？`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#1C1C1E', confirmButtonText: '确定批量作废' });
                if(check.isConfirmed) {
                    checkedIds.forEach(id => {
                        const idx = state[type].findIndex(x=>x.id===id);
                        if(idx !== -1) {
                            const deleted = state[type].splice(idx, 1)[0];
                            state.recycleBin.push({ id: 'rb_' + Date.now(), type, data: deleted });
                        }
                    });
                    await commitState(`批量作废清收 ${checkedIds.length} 项流水入库暂存`);
                }
            };

            const deletePlatform = async (id) => {
                const check = await Swal.fire({ text: '注销该推广公户将同步销毁其绑定的历史费用、对话、到院联动流，是否执行深度绝育删除？', icon: 'error', showCancelButton: true, confirmButtonColor: '#DF3333' });
                if(check.isConfirmed) {
                    state.platforms = state.platforms.filter(p=>p.id!==id);
                    state.costs = state.costs.filter(c=>c.platformId!==id);
                    state.visits = state.visits.filter(v=>v.platformId!==id);
                    state.chats = state.chats.filter(ch=>ch.platformId!==id);
                    await commitState(`注销清空了广告媒体推广渠道主档: ${id}`);
                }
            };

            // 【核心修正节点】：完美对齐全屏大图的数据交互引擎
            const openFullscreenChart = () => {
                const box = document.getElementById('chartFullscreenBox');
                box.classList.remove('hidden'); box.classList.add('flex');

                const fd = getFilteredData();
                const categories = { '脱毛护理': 0, '皮肤项目': 0, '注射项目': 0, '手术项目': 0 };
                fd.visits.forEach(v => {
                    const recordSum = v.items.reduce((s, i) => s + Number(i.amount), 0);
                    if(categories[v.category] !== undefined) categories[v.category] += recordSum;
                });

                // 计算当前筛选条件下的总盘业绩，用于计算高精百分比占位
                const globalTotalAmount = Object.values(categories).reduce((sum, current) => sum + current, 0);

                const ctx = document.getElementById('fullscreenPieChart');
                if(fullscreenChartInstance) fullscreenChartInstance.destroy();

                fullscreenChartInstance = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: Object.keys(categories),
                        datasets: [{
                            data: Object.values(categories),
                            backgroundColor: ['#C5A059', '#EADBB9', '#444655', '#A98443'],
                            borderWidth: 2,
                            borderColor: '#FFFFFF'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: 40 }, 
                        plugins: {
                            legend: { 
                                position: 'bottom', 
                                labels: { 
                                    padding: 24, 
                                    font: { size: 13, weight: 'bold', family: '"Noto Sans SC"' },
                                    // 动态在图例上直接追加汇总项
                                    generateLabels: (chart) => {
                                        const data = chart.data;
                                        if (data.labels.length && data.datasets.length) {
                                            return data.labels.map((label, i) => {
                                                const value = data.datasets[0].data[i];
                                                const percentage = globalTotalAmount > 0 ? ((value / globalTotalAmount) * 100).toFixed(1) : '0.0';
                                                return {
                                                    text: `${label} : ¥${value.toLocaleString()} (${percentage}%)`,
                                                    fillStyle: data.datasets[0].backgroundColor[i],
                                                    strokeStyle: '#FFFFFF',
                                                    lineWidth: 0,
                                                    hidden: false,
                                                    index: i
                                                };
                                            });
                                        }
                                        return [];
                                    }
                                } 
                            },
                            tooltip: {
                                enabled: true,
                                backgroundColor: 'rgba(28, 28, 30, 0.95)',
                                titleFont: { size: 14, weight: 'bold', family: '"Noto Sans SC"' },
                                bodyFont: { size: 13, family: '"Noto Sans SC"' },
                                padding: 12,
                                cornerRadius: 8,
                                callbacks: { 
                                    label: (context) => {
                                        const value = context.raw || 0;
                                        const percentage = globalTotalAmount > 0 ? ((value / globalTotalAmount) * 100).toFixed(1) : '0.0';
                                        return ` 核心核销款: ¥${Number(value).toLocaleString()}元 (占比: ${percentage}%)`; 
                                    } 
                                }
                            }
                        }
                    }
                });
            };

            const closeFullscreenChart = () => {
                const box = document.getElementById('chartFullscreenBox');
                box.classList.remove('flex'); box.classList.add('hidden');
            };

            const toggleSyncProgressBarUI = (visible, statusLabel = '') => {
                const el = document.getElementById('syncProgressLayer');
                const bar = document.getElementById('syncProgressBar');
                const percent = document.getElementById('syncPercent');
                const txt = document.getElementById('syncStatusText');
                if(!el || !bar) return;
                
                if(statusLabel) txt.innerText = statusLabel;
                if(visible) {
                    el.classList.remove('hidden'); el.classList.add('flex');
                    let p = 0;
                    const inv = setInterval(() => {
                        p += Math.floor(Math.random() * 25) + 5;
                        if(p >= 90) { p = 90; clearInterval(inv); }
                        bar.style.width = p + '%'; percent.innerText = p + '%';
                    }, 80);
                    el.dataset.intervalId = inv;
                } else {
                    clearInterval(Number(el.dataset.intervalId));
                    bar.style.width = '100%'; percent.innerText = '100%';
                    setTimeout(() => {
                        el.classList.remove('flex'); el.classList.add('hidden');
                        bar.style.width = '0%'; percent.innerText = '0%';
                    }, 250);
                }
            };

            const triggerCloudSynchronization = async () => {
                const { token, gistId, fbUrl } = state.settings;
                const payload = JSON.stringify({
                    platforms: state.platforms, costs: state.costs, visits: state.visits, chats: state.chats
                });

                if(token && gistId) {
                    toggleSyncProgressBarUI(true, '正在打包增量推向 GitHub Gist...');
                    try {
                        await fetch(`https://api.github.com/gists/${gistId}`, {
                            method: 'PATCH',
                            headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                            body: JSON.stringify({ files: { 'marketing_enterprise_db.json': { content: payload } } })
                        });
                    } catch (e) { console.error('Gist Sync Err:', e); }
                    finally { toggleSyncProgressBarUI(false); }
                }

                if(fbUrl) {
                    toggleSyncProgressBarUI(true, '正在对齐 Firebase 数据库快照...');
                    try {
                        await fetch(`${fbUrl}.json`, { method: 'PUT', body: payload });
                    } catch (e) { console.error('Firebase Sync Err:', e); }
                    finally { toggleSyncProgressBarUI(false); }
                }
            };

            const manualCloudSync = async (direction) => {
                const { token, gistId, fbUrl } = state.settings;
                if(!token && !gistId && !fbUrl) return;

                if(direction === 'upload') {
                    await triggerCloudSynchronization();
                    Swal.fire({ text: '云端数据库快照已被本地覆盖同步。', icon: 'success', confirmButtonColor: '#C5A059' });
                } else {
                    toggleSyncProgressBarUI(true, '正在从云端拉取全量备份解压...');
                    try {
                        let remoteData = null;
                        if (fbUrl) {
                            const res = await fetch(`${fbUrl}.json`);
                            remoteData = await res.json();
                        } else if (gistId && token) {
                            const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `Bearer ${token}` } });
                            const raw = await res.json();
                            remoteData = JSON.parse(raw.files['marketing_enterprise_db.json'].content);
                        }
                        if(remoteData) {
                            ['platforms','costs','visits','chats'].forEach(k => { if(remoteData[k]) state[k] = remoteData[k]; });
                            saveToLocalStorage();
                            buildMonthFilterStack();
                            refreshCurrentView();
                        }
                    } catch(e) { console.error(e); }
                    finally { toggleSyncProgressBarUI(false); }
                }
            };

            const autoConnectFirebase = () => {
                const { fbUrl } = state.settings;
                if(!fbUrl) return;
                if(window.EventSource) {
                    if(window.fbSSE) window.fbSSE.close();
                    const source = new EventSource(`${fbUrl}.json`);
                    source.addEventListener('put', (e) => {
                        const eventData = JSON.parse(e.data);
                        if (eventData && eventData.data && state.settings.mode !== 'admin') {
                            const d = eventData.data;
                            ['platforms','costs','visits','chats'].forEach(k => { if(d[k]) state[k] = d[k]; });
                            saveToLocalStorage();
                            refreshCurrentView();
                        }
                    });
                    window.fbSSE = source;
                }
            };

            const togglePermissionMode = () => {
                state.settings.mode = state.settings.mode === 'admin' ? 'readonly' : 'admin';
                saveSettings();
                applyPermissionUIOverlay();
                Swal.fire({ text: `已切入：${state.settings.mode==='admin'?'全功能管理员':'只读审计防护'}模式`, icon: 'info', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
            };

            const applyPermissionUIOverlay = () => {
                const isAdmin = state.settings.mode === 'admin';
                const rb = document.getElementById('roleBadge');
                const rt = document.getElementById('roleText');
                if(rb) rb.className = `w-2 h-2 rounded-full ${isAdmin?'bg-emerald-500':'bg-amber-500'}`;
                if(rt) rt.innerText = isAdmin ? '管理员模式' : '只读审计沙箱';
                
                document.querySelectorAll('.admin-auth-node').forEach(el => {
                    if(!isAdmin) {
                        el.classList.add('pointer-events-none', 'opacity-20');
                        if(el.tagName === 'BUTTON') el.disabled = true;
                    } else {
                        el.classList.remove('pointer-events-none', 'opacity-20');
                        if(el.tagName === 'BUTTON') el.disabled = false;
                    }
                });
            };

            const generateMagicUrlLink = () => {
                const currentUrl = window.location.href.split('?')[0];
                const bundle = {
                    t: state.settings.token,
                    g: state.settings.gistId,
                    f: state.settings.fbUrl,
                    m: 'admin'
                };
                const b64 = btoa(encodeURIComponent(JSON.stringify(bundle)));
                const finalLink = currentUrl + `?m=${b64}`;
                
                navigator.clipboard.writeText(finalLink);
                Swal.fire({
                    title: '🚀 双向读写魔术链接构建成功！',
                    text: '已将包含完整云同步路由凭证的魔术链接克隆至剪贴板。在另一台设备直接访问此链接，即可瞬间获得管理员权限并完美开启【实时云同步回传】！',
                    icon: 'success', confirmButtonColor: '#C5A059'
                });
            };

            const generateReadOnlyUrlLink = () => {
                const currentUrl = window.location.href.split('?')[0];
                const bundle = {
                    g: state.settings.gistId,
                    f: state.settings.fbUrl,
                    m: 'readonly'
                };
                const b64 = btoa(encodeURIComponent(JSON.stringify(bundle)));
                const finalLink = currentUrl + `?r=${b64}`;
                
                navigator.clipboard.writeText(finalLink);
                Swal.fire({ text: '🔒 审计监督只读链接生成就绪！已克隆至剪贴板，其他设备访问此链接只能只读查看大盘，无权修改或向云端上行业务。', icon: 'success', confirmButtonColor: '#C5A059' });
            };

            const parseUrlParametersOnLoad = () => {
                const params = new URLSearchParams(window.location.search);
                
                const m = params.get('m');
                if(m) {
                    try {
                        const cfg = JSON.parse(decodeURIComponent(atob(m)));
                        state.settings.token = cfg.t || '';
                        state.settings.gistId = cfg.g || '';
                        state.settings.fbUrl = cfg.f || '';
                        state.settings.mode = cfg.m || 'admin';
                        saveSettings();
                        logAction('超级双向魔术链接握手成功，已自动同步全线云通信授信组件');
                    } catch(e) { console.error('Magic link error:', e); }
                }
                
                const r = params.get('r');
                if(r) {
                    try {
                        const cfg = JSON.parse(decodeURIComponent(atob(r)));
                        state.settings.token = ''; 
                        state.settings.gistId = cfg.g || '';
                        state.settings.fbUrl = cfg.f || '';
                        state.settings.mode = 'readonly';
                        saveSettings();
                        logAction('安全防线切入：成功接入第三方只读审计沙箱流');
                    } catch(e) { console.error('Readonly link error:', e); }
                }

                const d = params.get('d');
                if(d) {
                    try {
                        const raw = JSON.parse(decodeURIComponent(atob(d)));
                        if(raw.p) {
                            state.platforms = raw.p.map(x=>({id:x[0], name:x[1], account:x[2]}));
                            state.costs = raw.c.map(x=>({id:'c_'+Math.random(), date:x[0], platformId:x[1], amount:x[2]}));
                            state.visits = raw.v.map(x=>({id:'v_'+Math.random(), date:x[0], platformId:x[1], category:x[2], items:x[3].map(i=>({name:i[0], count:i[1], amount:i[2]}))}));
                            state.chats = raw.ch.map(x=>({id:'ch_'+Math.random(), date:x[0], platformId:x[1], valid:x[2], invalid:x[3]}));
                            saveToLocalStorage();
                        }
                    } catch(e) { console.error(e); }
                }

                if(state.settings.gistId || state.settings.fbUrl) {
                    setTimeout(() => { manualCloudSync('download'); }, 200);
                }
            };

            const exportToExcel = (type) => {
                const book = XLSX.utils.book_new();
                let exportRows = [];
                if(type==='costs') {
                    exportRows = state.costs.map(c=>({ '账期':c.date, '平台ID':c.platformId, '消耗金额(元)':c.amount }));
                } else if(type==='chats') {
                    exportRows = state.chats.map(ch=>({ '账期':ch.date, '平台ID':ch.platformId, '有效对话':ch.valid, '无效对话':ch.invalid }));
                } else if(type==='visits') {
                    state.visits.forEach(v => {
                        v.items.forEach(i => {
                            exportRows.push({ '账期':v.date, '平台ID':v.platformId, '科室大类':v.category, '细分子项':i.name, '核销人数':i.count, '核销总额':i.amount });
                        });
                    });
                }
                const sheet = XLSX.utils.json_to_sheet(exportRows);
                XLSX.utils.book_append_sheet(book, sheet, `${type}_明细报表`);
                XLSX.writeFile(book, `Enterprise_Data_${type}_${Date.now()}.xlsx`);
                logAction(`导出了 [${type}] 流水账目至标准 Excel 格式文件`);
            };

            const toggleSidebar = () => {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            };

            return {
                init, route, toggleSidebar, handleFilterChange, toggleMonthDropdown, bulkSelectMonths, openPlatformModal, deletePlatform, openRecordModal, appendSubItemRow, recalcSubItemSum, deleteRecordRow, executeBatchDelete, restoreRecycleItem, openFullscreenChart, closeFullscreenChart, saveSystemSettings, manualCloudSync, generateMagicUrlLink, generateReadOnlyUrlLink, togglePermissionMode, triggerTableSearch, changePage, toggleBatchRows, exportToExcel
            };
        })();

        document.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>
